# 标普500 · 分析配置
# ───────────────────────────────────────────────────
# 【股价时间窗口】
#   基准：2026年3月最后交易日
#   回退：5期3年滚动（2026/2023, 2025/2022, ... 2022/2019）
#   含义：当前3月末股价 ÷ 3年前3月末的股价增长倍率
# ───────────────────────────────────────────────────
# 【营收时间窗口】
#   基准：最新年报（2025年）
#   回退：5期3年滚动（2025/2022, 2024/2021, ... 2021/2018）
#   含义：当年年报营收 ÷ 3年前年报的营收增长倍率
# ───────────────────────────────────────────────────
# 默认参数（可被 run.py CLI 参数覆盖）
defaults:
  window_years: 3
  num_windows: 5
# ───────────────────────────────────────────────────
# 筛选阈值
screening:
  cond_a_min: 1.3
  cond_b_threshold: 1.5
# ───────────────────────────────────────────────────
# 调整方法：修改下方 periods 数组即可重新定义全部时间窗口。
# price 和 revenue 的期数可以不同，双维度分析会自动对齐较短的期数。
# 若提供 defaults.window_years / num_windows，periods 将被自动覆盖。
index:
  name: "标普500"
  code: "SPX"
  market: "us"

stock_codes:
  type: "csv"
  csv_path: "configs/sp500_constituents.csv"
  ticker_col: "Ticker"
  name_col: "Company Name"

periods:
  price: [[2024,2019],[2025,2020],[2026,2021]]
  revenue: [[2023,2018],[2024,2019],[2025,2020]]
  labels: ['24/19','25/20','26/21']

output_dir: "~/.hermes/stock_cache/sp500_analysis"
