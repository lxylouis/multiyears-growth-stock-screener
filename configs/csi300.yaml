# 沪深300 · 分析配置
# ───────────────────────────────────────────────────
# 【股价时间窗口】
#   基准：2026年3月最后交易日
#   回退：5期5年滚动（2026/2021, 2025/2020, ... 2022/2017）
#   含义：当前3月末收盘价 ÷ 5年前3月末的收盘价增长倍率
# ───────────────────────────────────────────────────
# 【营收时间窗口】
#   基准：最新年报（2025年，A股营收年报通常滞后半年）
#   回退：5期5年滚动（2025/2020, 2024/2019, ... 2021/2016）
#   含义：当年年报营收 ÷ 5年前年报的营收增长倍率
# ───────────────────────────────────────────────────
# 默认参数（可被 run.py CLI 参数覆盖）
defaults:
  window_years: 5
  num_windows: 5
# ───────────────────────────────────────────────────
# 调整方法：修改下方 periods 数组即可重新定义全部时间窗口。
# price 和 revenue 的期数可以不同，双维度分析会自动对齐较短的期数。
index:
  name: "沪深300"
  code: "000300"
  market: "cn"

stock_codes:
  type: "index"
  source_func: "index_stock_cons"
  source_arg: "000300"

periods:
  price: [[2022,2017],[2023,2018],[2024,2019],[2025,2020],[2026,2021]]
  revenue: [[2021,2016],[2022,2017],[2023,2018],[2024,2019],[2025,2020]]
  labels: ['22/17','23/18','24/19','25/20','26/21']

output_dir: "~/.hermes/stock_cache/csi300_analysis"
