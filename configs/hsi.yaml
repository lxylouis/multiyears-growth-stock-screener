# 恒生指数 · 分析配置
# ───────────────────────────────────────────────────
# 【股价时间窗口】
#   基准：2026年3月最后交易日
#   回退：5期5年滚动（2026/2021, 2025/2020, ... 2022/2017）
#   含义：当前3月末收盘价 ÷ 5年前3月末的收盘价增长倍率
# ───────────────────────────────────────────────────
# 【营收时间窗口】
#   基准：最新年报（2025年，港股年报披露较慢）
#   回退：5期5年滚动（2025/2020, 2024/2019, ... 2021/2016）
#   含义：当年年报营收 ÷ 5年前年报的营收增长倍率
# ───────────────────────────────────────────────────
# 默认参数（可被 run.py CLI 参数覆盖）
defaults:
  window_years: 5
  num_windows: 5
# ───────────────────────────────────────────────────
# 调整方法：修改下方 periods 数组即可重新定义全部时间窗口。
# price 和 revenue 的期数可以不同，双维度分析会自动对齐较短的期数。
