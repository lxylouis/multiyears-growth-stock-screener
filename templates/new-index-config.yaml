# <指数名称> · 分析配置
# ───────────────────────────────────────────────────
# 【股价时间窗口】
#   基准：<年><月>最后交易日
#   回退：<窗口数>个×<年份>年窗口滚动
#   含义：当前<月>末收盘价 ÷ 多年前<月>末的收盘价增长倍率
# ───────────────────────────────────────────────────
# 【营收时间窗口】
#   基准：最新年报（<年>年）
#   回退：<窗口数>个×<年份>年窗口滚动
#   含义：当年年报营收 ÷ 多年前年报的营收增长倍率
# ───────────────────────────────────────────────────
# 默认参数（可被 run.py CLI 参数覆盖）
defaults:
  window_years: 3
  num_windows: 5
# ───────────────────────────────────────────────────
# 筛选阈值
#   cond_a_min: 条件A——所有窗口倍率均不低于此值（防大幅衰退）
#   cond_b_threshold: 条件B——最新窗口倍率超过此值（参见 defaults 说明文档）
screening:
  cond_a_min: 0.9
  cond_b_threshold: 1.5
# ───────────────────────────────────────────────────
# 调整方法：修改下方 periods 数组即可重新定义全部时间窗口。
# price 和 revenue 的窗口数可以不同，双维度分析会自动对齐较短的。
# 若提供 defaults + CLI 参数，YAML 的 periods 将被覆盖。
index:
  name: "<指数显示名>"
  code: "<指数代码>"
  # market: "cn"  # A股
  # market: "hk"  # 港股
  # market: "us"  # 美股

stock_codes:
  # A股：从AKShare指数成分股获取
  # type: "index"
  # source_func: "index_stock_cons"
  # source_arg: "399006"
  #
  # 美股：从CSV文件读取
  # type: "csv"
  # csv_path: "configs/sp500_constituents.csv"
  # ticker_col: "Ticker"
  # name_col: "Company Name"
  #
  # 港股：硬编码列表
  # type: "hardcoded"
  # codes:
  #   - "00001"
  #   - "00700"

periods:
  price: [[2023,2020],[2024,2021],[2025,2022],[2026,2023]]
  revenue: [[2022,2019],[2023,2020],[2024,2021],[2025,2022]]
  labels: ['23/20','24/21','25/22','26/23']

output_dir: "~/.hermes/stock_cache/<指数名>_analysis"
